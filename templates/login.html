<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso — Cotizador GONDER</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100dvh; display: flex; align-items: center; justify-content: center; background: #111; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .card { background: #fff; border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); text-align: center; }
    .logo-box { background: #000; border-radius: 10px; padding: 10px 18px; display: inline-block; margin-bottom: 1.25rem; }
    .logo-box span { font-size: 1.6rem; font-weight: 900; color: #F2C200; letter-spacing: 2px; }
    h1 { font-size: 1.1rem; font-weight: 700; color: #111; margin-bottom: 0.25rem; }
    p.sub { font-size: 0.82rem; color: #888; margin-bottom: 1.75rem; }
    label { display: block; text-align: left; font-size: 0.78rem; font-weight: 600; color: #444; margin-bottom: 0.4rem; }
    input[type="password"] { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; transition: border-color 0.2s; margin-bottom: 1.25rem; }
    input[type="password"]:focus { border-color: #F2C200; box-shadow: 0 0 0 3px rgba(242,194,0,0.15); }
    .error { background: #fff0f0; border: 1px solid #ffcccc; color: #c0392b; border-radius: 8px; padding: 0.6rem 0.9rem; font-size: 0.82rem; margin-bottom: 1rem; text-align: left; }
    button { width: 100%; padding: 0.85rem; background: #000; color: #F2C200; font-size: 0.95rem; font-weight: 700; letter-spacing: 0.5px; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #222; }
    button:active { background: #F2C200; color: #000; }
    .footer { margin-top: 1.5rem; font-size: 0.72rem; color: #bbb; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-box"><span>GONDER</span></div>
    <h1>Cotizador Sucursales</h1>
    <p class="sub">Ingresa la clave de acceso para continuar</p>
    {% if error %}
    <div class="error">&#9888; {{ error }}</div>
    {% endif %}
    <form method="POST" action="/login">
      <label for="clave">Clave de acceso</label>
      <input type="password" id="clave" name="clave" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" autofocus autocomplete="current-password"/>
      <button type="submit">Entrar &#8594;</button>
    </form>
    <p class="footer">FERRETERIA &middot; PINTURA &middot; ILUMINACION</p>
  </div>
</body>
</html>
